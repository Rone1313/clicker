<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Хомяк vs Трамп — Космический бой</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-wrap">
        <canvas id="gameCanvas"></canvas>

        <div class="hud">
            <div class="hud-left">
                <div class="score">Счёт: <span id="score">0</span></div>
                <div class="level">Уровень: <span id="level">1</span></div>
            </div>
            <div class="hud-right">
                <div class="lives" id="lives">❤❤❤</div>
            </div>
        </div>

        <div class="overlay" id="startScreen">
            <h1>🐹 vs 🇺🇸</h1>
            <h2>Космический бой</h2>
            <p class="tagline">Хомяк защищает галактику от армии Трампов!</p>
            <ul class="howto">
                <li>📱 Веди пальцем — хомяк летит за тобой</li>
                <li>🌰 Стрельба семечками — автоматически</li>
                <li>💥 Уворачивайся от красных «твитов»</li>
            </ul>
            <button class="btn-play" id="startBtn">В БОЙ!</button>
        </div>

        <div class="overlay hidden" id="gameOverScreen">
            <h1>💀 Поражение</h1>
            <p class="final-score">Счёт: <span id="finalScore">0</span></p>
            <p class="tagline" id="gameOverMsg">Трамп захватил галактику…</p>
            <button class="btn-play" id="restartBtn">ЕЩЁ РАЗ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
